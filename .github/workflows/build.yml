name: Build Family Finder APK
on: [push]
jobs:
  flutter_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # Step 1: Pehle purane saare kachre ko saaf karein
      - run: |
          rm -rf android
          flutter clean
          
      # Step 2: Bilkul fresh standard Android structure generate karein
      - run: flutter create . --platforms android
      
      # Step 3: Dependencies download karein
      - run: flutter pub get
      
      # Step 4: Final APK compile karein
      - run: flutter build apk --release
      
      # Step 5: Generated APK ko upload karein
      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: PhoneFinder-APK
          path: build/app/outputs/flutter-apk/app-release.apk
