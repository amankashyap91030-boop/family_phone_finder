name: Build Family Finder APK
on: [push]
jobs:
  flutter_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # Step 1: Clean build environment
      - run: |
          rm -rf android
          flutter clean
          
      # Step 2: Fresh standard Android project
      - run: flutter create . --platforms android
      
      # Step 3: Bilkul compatible baseline dependencies inject karein
      - run: |
          cat << 'PUBSPEC' > pubspec.yaml
          name: family_phone_finder
          description: Family device locator application.
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            flutter_riverpod: ^2.5.1
            hive: ^2.2.3
            hive_flutter: ^1.1.0
            flutter_secure_storage: ^9.0.0
            path_provider: ^2.1.2
            crypto: ^3.0.3
            flutter_blue_plus: 1.4.0
            flutter_compass: ^0.8.1
            audioplayers: ^6.0.0
            torch_light: ^1.0.0
            permission_handler: ^11.3.1
            cupertino_icons: ^1.0.6
          dev_dependencies:
            flutter_test:
              sdk: flutter
            hive_generator: ^2.0.1
            build_runner: ^2.4.8
          flutter:
            uses-material-design: true
          PUBSPEC

      # Step 4: Run fetch and build
      - run: flutter pub get
      - run: flutter build apk --release
      
      # Step 5: Save output APK
      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: PhoneFinder-APK
          path: build/app/outputs/flutter-apk/app-release.apk
