name: Build Family Finder APK
on: [push]
jobs:
  flutter_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      # Purana structure poora saaf karein
      - run: rm -rf android
      
      # Strictly Android v2 embedding ke sath fresh structure generate karein
      - run: flutter create . --overwrite --platform android --org com.family --project-name family_phone_finder
      
      # Naye Gradle standards ke mutabik clean Manifest inject karein
      - run: |
          cat << 'MANIFEST' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN"/>
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <application android:label="Family Phone Finder" android:icon="@mipmap/ic_launcher">
                  <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop" android:theme="@style/LaunchTheme" android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|screenLayout|density|uiMode" android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST

      - run: flutter pub get
      - run: flutter build apk --release
      
      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: PhoneFinder-APK
          path: build/app/outputs/flutter-apk/app-release.apk
